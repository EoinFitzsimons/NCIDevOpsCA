version: 2.1

orbs:
  aws-ecr: circleci/aws-ecr@7.0.0

executors:
  node-exec:
    docker:
      - image: cimg/node:18.16

jobs:
  build:
    executor: node-exec
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run: npm ci
      - run: npm test
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - persist_to_workspace:
          root: .
          paths:
            - .

  build-and-push:
    executor: node-exec
    steps:
      - attach_workspace:
          at: .
      - aws-ecr/build-and-push-image:
          account-url: "${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
          repo: "${ECR_REPOSITORY}"
          tag: "${IMAGE_TAG:-latest}"
          region: "us-east-1"
          dockerfile: Dockerfile

  deploy-ec2:
    executor: node-exec
    steps:
      - add_ssh_keys:
          fingerprints:
            - "<CIRCLECI_SSH_KEY_FINGERPRINT>"
      - run:
          name: SSH deploy to EC2 (pull & run container)
          command: |
            ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} <<'SSH_CMDS'
              aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com
              docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG:-latest} || true
              docker rm -f simpleapp || true
              docker run -d --name simpleapp -p 8080:8080 --restart unless-stopped \
                ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}
            SSH_CMDS

workflows:
  build_and_deploy:
    jobs:
      - build
      - build-and-push:
          requires:
            - build
      - deploy-ec2:
          requires:
            - build-and-push