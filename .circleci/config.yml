version: 2.1

executors:
  node-exec:
    docker:
      - image: cimg/node:18.16

jobs:
  build:
    executor: node-exec
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run: npm ci
      - run: npm test
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - persist_to_workspace:
          root: .
          paths:
            - .

  deploy:
    executor: node-exec
    steps:
      - attach_workspace:
          at: .
      - add_ssh_keys:
          fingerprints:
            - "SHA256:Lza93E8Bh7CMyYEht0Yn643rIyrGrprBF5Kir7tyHvg"
      - run:
          name: Test SSH connectivity
          command: ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "echo ok"
      - run:
          name: Sync files to EC2
          command: |
            rsync -az --delete --exclude '.git' ./ ${SSH_USER}@${SSH_HOST}:~/app
      - run:
          name: Remote deploy commands (npm + pm2)
          command: |
            ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "cd ~/app || exit 1 && npm ci --production && pm2 stop example_app || true && pm2 start ./bin/www --name example_app --env production && pm2 save"

workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build